<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f4fbf6">
<meta name="description" content="极简云同步健身计划 — 记录训练、跟踪进度、查看历史">
<title>健身计划 | Fitness Plan</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/app-icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="assets/app.css">

</head>
<body>
<div id="app">


<!-- Floating Orbs Background -->
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- Loader -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">同步数据中...</div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="header-top">
    <h1 class="header-title" id="headerTitle">胸部</h1>
    <div class="header-actions">
      <span class="progress-text" id="progressText">0/0</span>
      <button class="settings-trigger" id="btnStats" aria-label="统计数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </button>

      <button class="settings-trigger" id="btnSettings" aria-label="动作设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 8.4a3.6 3.6 0 1 0 0 7.2 3.6 3.6 0 0 0 0-7.2Z"/>
          <path d="M19 12a7.1 7.1 0 0 0-.1-1.2l2-1.5-2-3.4-2.4 1a7.4 7.4 0 0 0-2-1.2L14.2 3h-4.1l-.4 2.7a7.4 7.4 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.5A7.1 7.1 0 0 0 5.2 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.4-1a7.4 7.4 0 0 0 2 1.2l.4 2.7h4.1l.4-2.7a7.4 7.4 0 0 0 2-1.2l2.4 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2Z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="sync-status" id="syncStatus" data-state="local" aria-live="polite">
    <span class="sync-dot" aria-hidden="true"></span>
    <span id="syncStatusText">本地已保存</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</header>

<!-- Tab Panels -->
<main class="tab-panels">
  <section class="tab-panel" id="panel-overview"></section>
  <section class="tab-panel active" data-part="chest" id="panel-chest"></section>
  <section class="tab-panel" data-part="shoulder" id="panel-shoulder"></section>
  <section class="tab-panel" data-part="legs" id="panel-legs"></section>
  <section class="tab-panel" data-part="back" id="panel-back"></section>
  <section class="tab-panel" data-part="abs" id="panel-abs"></section>
</main>

<!-- FAB -->
<button class="fab" id="fabAdd" aria-label="添加动作">+</button>
<div class="part-rail" id="partRail" aria-label="部位快捷切换"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottomNav">
  <div class="chip-row" id="chipRow"></div>
  <div class="mode-bar">
    <button class="mode-tab" data-mode="overview" id="modeOverview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      总览
    </button>
    <button class="mode-tab active" data-mode="split" id="modeSplit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="8" cy="6" r="1.5" fill="currentColor"/><circle cx="14" cy="12" r="1.5" fill="currentColor"/><circle cx="10" cy="18" r="1.5" fill="currentColor"/></svg>
      分化
    </button>
  </div>
</nav>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">添加动作</h2>
    <div class="form-group">
      <label class="form-label">从动作记录选择</label>
      <select class="form-input" id="templateSelect">
        <option value="">选择已添加过的动作</option>
      </select>
      <div class="template-helper">选择后自动带入最近一次组数、次数和重量</div>
    </div>
    <div class="form-group">
      <label class="form-label">动作名称</label>
      <input class="form-input" type="text" id="inputName" list="exerciseList" placeholder="例如：卧推" autocomplete="off">
      <datalist id="exerciseList"></datalist>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">组数</label>
        <input class="form-input" type="number" id="inputSets" value="4" min="1" max="50" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">次数</label>
        <input class="form-input" type="number" id="inputReps" value="12" min="1" max="300" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">重量(kg)</label>
        <input class="form-input" type="number" id="inputWeight" value="20" min="0" max="999" step="2.5" inputmode="decimal">
      </div>
    </div>
    <button class="btn-save" id="btnSave">保存</button>
  </div>
</div>

<!-- Technique Modal -->
<div class="modal-overlay" id="techniqueModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="settings-top">
      <h2 class="modal-title" id="techniqueTitle">动作要领</h2>
      <button class="sheet-close" id="btnCloseTechnique" aria-label="关闭动作要领">&times;</button>
    </div>
    <p class="technique-hint">记录发力重点、呼吸节奏、动作幅度或需要避开的错误动作。</p>
    <div class="form-group">
      <label class="form-label" for="techniqueInput">动作要领</label>
      <textarea class="form-input technique-textarea" id="techniqueInput" placeholder="例如：肩胛后收下沉，下降到胸前，推起时不要锁死肘关节。"></textarea>
    </div>
    <button class="btn-save" id="btnSaveTechnique">保存要领</button>
  </div>
</div>

<!-- Settings / Exercise Library -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-sheet settings-sheet">
    <div class="modal-handle"></div>
    <div class="settings-top">
      <h2 class="modal-title">动作设置</h2>
      <button class="sheet-close" id="btnCloseSettings" aria-label="关闭设置">&times;</button>
    </div>
    <p class="settings-copy">这里管理添加过的动作记录。删除记录不会影响今天已经添加的训练。</p>
    <div class="settings-parts" id="settingsParts"></div>
    <div class="library-add">
      <span class="library-add-title">新增动作模板</span>
      <div class="library-add-grid">
        <input class="form-input" type="text" id="libraryInputName" placeholder="动作名称" autocomplete="off">
        <input class="form-input" type="number" id="libraryInputSets" value="4" min="1" max="50" inputmode="numeric" aria-label="组数">
        <input class="form-input" type="number" id="libraryInputReps" value="12" min="1" max="300" inputmode="numeric" aria-label="次数">
        <input class="form-input" type="number" id="libraryInputWeight" value="20" min="0" max="999" step="2.5" inputmode="decimal" aria-label="重量">
      </div>
      <button class="library-add-btn" id="btnAddTemplate" type="button">保存模板</button>
    </div>
    <div id="libraryList"></div>
  </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay" id="statsModal">
  <div class="modal-sheet settings-sheet">
    <div class="modal-handle"></div>
    <div class="settings-top">
      <h2 class="modal-title">数据统计</h2>
      <button class="sheet-close" id="btnCloseStats" aria-label="关闭统计">&times;</button>
    </div>
    
    <div class="stats-overview">
      <div class="stat-card">
        <div class="stat-value" id="statWeekDays">0</div>
        <div class="stat-label">本周训练天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statMonthDays">0</div>
        <div class="stat-label">本月训练天数</div>
      </div>
    </div>
    
    <div class="calendar-wrapper">
      <div class="calendar-header">
        <div class="calendar-title" id="calendarTitle">2026年5月</div>
        <div class="calendar-nav">
          <button class="calendar-btn" id="btnPrevMonth">&lt;</button>
          <button class="calendar-btn" id="btnNextMonth">&gt;</button>
        </div>
      </div>
      
      <div class="calendar-grid">
        <div class="calendar-day-header">一</div>
        <div class="calendar-day-header">二</div>
        <div class="calendar-day-header">三</div>
        <div class="calendar-day-header">四</div>
        <div class="calendar-day-header">五</div>
        <div class="calendar-day-header">六</div>
        <div class="calendar-day-header">日</div>
        <!-- dates will be injected here -->
      </div>
      <div id="calendarDates" class="calendar-grid"></div>
    </div>
    
    <div id="dayDetailsContainer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

</div>
<script src="assets/app.js" defer></script>
</body>
</html>
