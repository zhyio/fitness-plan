<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="极简云同步健身计划 — 记录训练、跟踪进度、查看历史">
<title>健身计划 | Fitness Plan</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/app-icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========== DESIGN TOKENS ========== */
:root {
  --bg-primary: #0a0a0f;
  --bg-card: rgba(20, 20, 30, 0.6);
  --bg-card-hover: rgba(30, 30, 45, 0.8);
  --border-card: rgba(255, 255, 255, 0.05);
  --text-primary: #f0f0f5;
  --text-secondary: rgba(255, 255, 255, 0.6);
  --text-dim: rgba(255, 255, 255, 0.3);
  --accent-chest: #ff3366;
  --accent-shoulder: #ff9933;
  --accent-legs: #00e676;
  --accent-back: #2979ff;
  --accent-abs: #00d7c7;
  --accent-history: #e040fb;
  --accent: var(--accent-chest);
  --accent-glow: rgba(255, 51, 102, 0.25);
  --radius: 20px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --tab-h: 70px;
}

/* ========== RESET ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ========== GLOBAL ========== */
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
  position: relative;
}

/* ========== FLOATING ORBS BACKGROUND ========== */
.bg-orbs {
  position: fixed; inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.13;
  will-change: transform;
}
.bg-orb:nth-child(1) {
  width: min(350px, 80vw); height: min(350px, 80vw);
  background: var(--accent-chest);
  top: -10%; left: -10%;
  animation: orbFloat1 28s infinite ease-in-out;
}
.bg-orb:nth-child(2) {
  width: min(280px, 65vw); height: min(280px, 65vw);
  background: var(--accent-back);
  bottom: 15%; right: -15%;
  animation: orbFloat2 32s infinite ease-in-out;
}
.bg-orb:nth-child(3) {
  width: min(220px, 55vw); height: min(220px, 55vw);
  background: var(--accent-legs);
  top: 45%; left: 25%;
  animation: orbFloat3 24s infinite ease-in-out;
}
@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(40px, 60px) scale(1.05); }
  50% { transform: translate(-30px, 90px) scale(0.95); }
  75% { transform: translate(50px, 25px) scale(1.02); }
}
@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(-50px, -40px) scale(1.08); }
  50% { transform: translate(35px, -70px) scale(0.92); }
  75% { transform: translate(-25px, 50px) scale(1.04); }
}
@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(70px, -50px) scale(1.1); }
  66% { transform: translate(-40px, 60px) scale(0.9); }
}

/* ========== KEYFRAME ANIMATIONS ========== */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.92) translateY(16px); filter: blur(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}
@keyframes fabIn {
  from { transform: scale(0) rotate(-120deg); opacity: 0; }
  to   { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes shimmer {
  from { background-position: -200% 0; }
  to   { background-position: 200% 0; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes neonPulse {
  0%, 100% { box-shadow: 0 4px 24px var(--accent-glow); }
  50%      { box-shadow: 0 4px 36px var(--accent-glow), 0 0 60px var(--accent-glow); }
}
@keyframes bounceIn {
  0%   { transform: scale(0.3); opacity: 0; }
  50%  { transform: scale(1.08); }
  70%  { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes rippleAnim {
  to { transform: scale(2.5); opacity: 0; }
}
@keyframes particleBurstAnim {
  0%   { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}
@keyframes numberPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
@keyframes emptyArtworkFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-5px) scale(1.02); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ========== LOADER ========== */
.loader-overlay {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.4s ease-out;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
.loader-text {
  color: var(--text-secondary);
  font-size: 14px;
  letter-spacing: 0.5px;
}

/* ========== HEADER ========== */
.app-header {
  position: sticky; top: 0; z-index: 50;
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  background: linear-gradient(to bottom, var(--bg-primary) 50%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.header-top {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.header-title {
  font-size: clamp(22px, 6vw, 28px);
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--text-primary) 70%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.progress-text {
  font-size: 13px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  transition: transform 0.3s;
}
.progress-text.pop {
  animation: numberPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-trigger {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.15s;
}
.settings-trigger svg { width: 20px; height: 20px; }
.settings-trigger:active {
  color: var(--accent);
  border-color: var(--accent-glow);
  background: var(--accent-glow);
  transform: scale(0.94);
}

/* ========== PROGRESS BAR (LIQUID STYLE) ========== */
.progress-bar {
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent), white 25%));
  box-shadow: 0 0 14px var(--accent-glow);
  width: 0%;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.progress-fill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(0,0,0,0.15) 100%);
}
.progress-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  background-size: 200% 100%;
  animation: shimmer 2s infinite linear;
}

/* ========== TAB PANELS ========== */
.tab-panels {
  padding: 4px clamp(12px, 4vw, 20px) 16px;
  position: relative;
  z-index: 1;
}
.tab-panel {
  display: none;
  animation: fadeSlideIn 0.35s ease-out;
}
.tab-panel.active {
  display: block;
}

/* ========== EXERCISE CARDS ========== */
.exercise-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-card);
  border-radius: var(--radius);
  padding: clamp(14px, 4vw, 20px);
  margin-bottom: 12px;
  animation: cardIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  position: relative;
  overflow: hidden;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  touch-action: manipulation;
}
.exercise-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--accent);
  opacity: 0.25;
  transition: opacity 0.4s, box-shadow 0.4s;
}
.exercise-card:active {
  background: var(--bg-card-hover);
  transform: scale(0.985);
}
.exercise-card.all-done {
  border-color: var(--accent);
  box-shadow: 0 0 24px var(--accent-glow), inset 0 0 30px var(--accent-glow);
}
.exercise-card.all-done::before {
  opacity: 1;
  box-shadow: 0 0 18px var(--accent);
}
.exercise-card.celebrate {
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.card-header {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 6px;
}
.card-name {
  flex: 1;
  font-size: clamp(15px, 4vw, 17px);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-weight {
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 3px 10px;
  border-radius: 8px;
  white-space: nowrap;
}
.btn-delete {
  background: none; border: none;
  color: var(--text-dim);
  font-size: 22px; cursor: pointer;
  padding: 4px 6px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  touch-action: manipulation;
}
.btn-delete:hover, .btn-delete:active {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.12);
}
.card-info {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.technique-btn {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
  gap: 5px;
  min-height: 28px;
  padding: 0 9px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
  transition: color 0.2s, background 0.2s, border-color 0.2s, transform 0.15s;
}
.technique-btn::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  box-shadow: none;
  transition: background 0.2s, box-shadow 0.2s;
}
.technique-btn.has-note {
  color: var(--accent);
  background: var(--accent-glow);
  border-color: rgba(255,255,255,0.12);
}
.technique-btn.has-note::before {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
}
.technique-btn:active {
  transform: scale(0.96);
}

/* ========== SET CIRCLES ========== */
.set-row {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(6px, 2vw, 10px);
  margin-bottom: 12px;
}
.set-circle {
  width: clamp(40px, 11vw, 48px);
  height: clamp(40px, 11vw, 48px);
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: clamp(13px, 3.8vw, 15px);
  font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  touch-action: manipulation;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.set-circle.done {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 4px 16px var(--accent-glow);
}
/* Ripple inside circle */
.set-circle .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0);
  animation: rippleAnim 0.5s ease-out forwards;
  pointer-events: none;
}

.card-footer {
  display: flex; align-items: center;
  justify-content: space-between;
}
.card-progress {
  font-size: 12px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}
.card-pct {
  font-size: 12px; font-weight: 600;
  color: var(--accent);
}

/* ========== PARTICLE BURST ========== */
.particle-burst {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  animation: particleBurstAnim 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  animation: fadeSlideIn 0.5s ease-out;
}
.empty-illustration {
  display: block;
  width: min(132px, 38vw);
  height: auto;
  margin: 0 auto 18px;
  filter: drop-shadow(0 12px 22px rgba(224, 64, 251, 0.18));
  animation: emptyArtworkFloat 4s infinite ease-in-out;
  user-select: none;
  -webkit-user-drag: none;
}
.empty-state p {
  font-size: 14px;
  line-height: 1.7;
}

/* ========== FAB ========== */
.fab {
  position: fixed;
  bottom: calc(var(--tab-h) + var(--safe-bottom) + 18px);
  right: clamp(16px, 5vw, 24px);
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff; border: none;
  font-size: 30px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px var(--accent-glow);
  cursor: pointer; z-index: 60;
  transition: background 0.3s, transform 0.15s;
  animation: fabIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s backwards,
             neonPulse 3s infinite 1s;
  touch-action: manipulation;
}
.fab:active { transform: scale(0.88); }
.fab.hidden { display: none; }

/* ========== BOTTOM TAB BAR ========== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  display: flex;
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-top: 1px solid rgba(255,255,255,0.04);
  z-index: 100;
  position: fixed;
}
.tab-item {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  color: var(--text-dim);
  background: none; border: none;
  cursor: pointer;
  transition: color 0.3s;
  touch-action: manipulation;
  font-family: inherit;
  position: relative;
  padding: 4px 0;
}
.tab-item.active {
  color: var(--accent);
}
.tab-icon {
  width: 28px; height: 28px;
  overflow: visible;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
              filter 0.3s ease;
}
.tab-icon .icon-accent {
  opacity: 0.08;
  transition: opacity 0.3s ease, fill 0.3s ease;
}
.tab-item.active .tab-icon {
  transform: translateY(-2px) scale(1.12);
  filter: drop-shadow(0 0 8px var(--accent-glow));
}
.tab-item.active .tab-icon .icon-accent {
  opacity: 0.22;
}
.tab-label { font-size: 11px; font-weight: 500; letter-spacing: 0.3px; }

/* Tab Slide Indicator */
.tab-indicator {
  position: absolute;
  top: 0; left: 0;
  height: 3px;
  background: var(--accent);
  border-radius: 0 0 4px 4px;
  transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
              width 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
              background 0.4s;
  box-shadow: 0 4px 14px var(--accent);
  z-index: 101;
}

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  opacity: 0; visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, #1a1a2e 0%, #141420 100%);
  border-radius: 24px 24px 0 0;
  padding: 20px clamp(16px, 5vw, 24px) calc(24px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 201;
  max-height: 85dvh;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.15);
  margin: 0 auto 18px;
}
.modal-title {
  font-size: clamp(17px, 5vw, 20px);
  font-weight: 700;
  margin-bottom: 20px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}
.form-input {
  width: 100%;
  height: 48px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 16px;
  padding: 0 14px;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.form-input::placeholder { color: var(--text-dim); }
.technique-textarea {
  width: 100%;
  min-height: 180px;
  resize: vertical;
  line-height: 1.65;
  padding-top: 14px;
  padding-bottom: 14px;
}
.technique-hint {
  margin: -4px 0 16px;
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.55;
}
.template-helper {
  margin-top: 6px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--text-dim);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
@media (max-width: 340px) {
  .form-row {
    grid-template-columns: 1fr 1fr;
  }
  .form-row .form-group:last-child {
    grid-column: 1 / -1;
  }
}
.btn-save {
  width: 100%;
  height: 50px;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent), white 15%));
  color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  font-family: inherit;
  margin-top: 4px;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-save:active { transform: scale(0.96); }

/* ========== SETTINGS / EXERCISE LIBRARY ========== */
.settings-sheet { min-height: min(64dvh, 520px); }
.settings-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.settings-top .modal-title { margin-bottom: 0; }
.sheet-close {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
}
.settings-copy {
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.55;
  margin-bottom: 16px;
}
.settings-parts {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 4px;
  scrollbar-width: none;
}
.settings-parts::-webkit-scrollbar { display: none; }
.settings-part-btn {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  padding: 7px 13px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
}
.settings-part-btn.active {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 3px 14px var(--accent-glow);
}
.library-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 12px 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-card);
  background: var(--bg-card);
  margin-bottom: 8px;
}
.library-item-main { flex: 1; min-width: 0; }
.library-item-name {
  display: block;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.library-item-detail {
  display: block;
  color: var(--text-secondary);
  font-size: 12px;
  margin-top: 4px;
}
.library-actions {
  display: flex;
  gap: 6px;
}
.library-use,
.library-remove {
  border: none;
  border-radius: 9px;
  padding: 8px 10px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
.library-use {
  color: var(--accent);
  background: var(--accent-glow);
}
.library-remove {
  color: #ff8094;
  background: rgba(255, 51, 102, 0.1);
}
.library-empty {
  padding: 44px 18px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.65;
}

/* ========== STATS & CALENDAR PANEL ========== */
.stats-overview {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-sm);
  padding: 16px 12px;
  text-align: center;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}
.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
}

.calendar-wrapper {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
}
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.calendar-title {
  font-size: 15px;
  font-weight: 600;
}
.calendar-nav {
  display: flex;
  gap: 8px;
}
.calendar-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-primary);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
/* Note: .set-circle base styles are defined above in SET CIRCLES section.
   Below are contextual overrides for bonus sets only. */
.set-circle.bonus {
  opacity: 0.5;
  background: rgba(255, 255, 255, 0.02);
  border: 1px dashed rgba(255, 255, 255, 0.2);
}
.set-circle.bonus.done {
  opacity: 1;
  background: var(--accent);
  border-style: solid;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  text-align: center;
}
.calendar-day-header {
  font-size: 11px;
  color: var(--text-dim);
  padding-bottom: 4px;
}
.calendar-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  color: var(--text-secondary);
  border: 1px solid transparent;
}
.calendar-cell.has-record {
  color: var(--text-primary);
  font-weight: 600;
}
.calendar-cell.has-record::after {
  content: '';
  position: absolute;
  bottom: 3px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 4px var(--accent-glow);
}
.calendar-cell.selected {
  border-color: var(--accent);
  background: rgba(255,255,255,0.04);
}
.calendar-cell.empty {
  cursor: default;
}
.day-details {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-sm);
  padding: 16px;
}
.day-details-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
}
.day-detail-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
}
.day-detail-name { font-weight: 500; }
.day-detail-stats { color: var(--text-secondary); }
.day-empty {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  padding: 20px 0;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 0; background: transparent; }

/* ========== MOBILE RESPONSIVE ENHANCEMENTS ========== */
@media (max-width: 430px) {
  .exercise-card {
    padding: clamp(16px, 4.5vw, 22px);
    margin-bottom: 14px;
  }
  .card-header {
    gap: 10px;
    margin-bottom: 8px;
  }
  .card-name {
    font-size: clamp(15.5px, 4.2vw, 18px);
  }
  .card-weight {
    font-size: 13.5px;
    padding: 4px 11px;
  }
  .set-row {
    gap: clamp(8px, 2.5vw, 12px);
    margin-bottom: 14px;
  }
  .set-circle {
    width: clamp(42px, 11.5vw, 48px);
    height: clamp(42px, 11.5vw, 48px);
    font-size: clamp(13.5px, 4vw, 15px);
  }
  .card-info {
    font-size: 13.5px;
    margin-bottom: 14px;
  }
  .technique-btn {
    min-height: 32px;
    padding: 0 11px;
    font-size: 12px;
  }
  .tab-icon {
    width: 30px; height: 30px;
  }
  .tab-label {
    font-size: 11.5px;
  }
  .btn-delete {
    font-size: 24px;
    padding: 6px 8px;
  }
  .settings-trigger {
    width: 42px;
    height: 42px;
  }
  .settings-trigger svg {
    width: 21px;
    height: 21px;
  }
}

/* Extra enhancements for larger phones (iPhone Pro Max, etc.) */
@media (min-width: 390px) and (max-width: 430px) {
  .tab-item {
    gap: 4px;
  }
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: calc(var(--tab-h) + var(--safe-bottom) + 80px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30, 30, 45, 0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary);
  padding: 12px 24px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ========== AUTH PANEL ========== */
#authScreen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-primary);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px;
}
.auth-box {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 40px 20px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  text-align: center;
}
.auth-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.auth-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 30px;
}
.auth-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 16px;
  padding: 14px 16px;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.auth-input:focus {
  border-color: var(--accent);
}
.auth-btn-group {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}
.btn-auth {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.2s;
}
.btn-auth:active {
  opacity: 0.8;
}
.btn-auth.primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-auth.secondary {
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-card);
}
#authError {
  color: #ff3366;
  font-size: 13px;
  margin-top: 16px;
  min-height: 20px;
}
.btn-logout {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: transparent;
  border: 1px solid #ff3366;
  color: #ff3366;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-logout:active {
  background: rgba(255,51,102,0.1);
}
</style>

</head>
<body>
<div id="authScreen" style="display: none;">
  <div class="auth-box">
    <div class="auth-title">Fitness Plan</div>
    <div class="auth-subtitle">记录每一次泵感</div>
    <input type="text" id="authAccount" class="auth-input" placeholder="输入账号（任意字符）" autocomplete="username">
    <input type="password" id="authPassword" class="auth-input" placeholder="输入密码" autocomplete="current-password">
    <div class="auth-btn-group">
      <button class="btn-auth secondary" id="btnShowRegister">去注册</button>
      <button class="btn-auth primary" id="btnAuthLogin">登录</button>
    </div>
    <div id="authError"></div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-overlay" id="registerModal" style="z-index: 10000;">
  <div class="modal-sheet settings-sheet" style="padding: 24px;">
    <div class="settings-top">
      <h2 class="modal-title">注册新账号</h2>
      <button class="sheet-close" id="btnCloseRegister" aria-label="关闭">&times;</button>
    </div>
    <input type="text" id="regAccount" class="auth-input" placeholder="设置账号名称（任意字符）" style="margin-top: 10px;">
    <input type="password" id="regPassword" class="auth-input" placeholder="设置密码 (至少6位)">
    <button class="btn-auth primary" id="btnSubmitRegister" style="width: 100%; margin-top: 10px;">确认注册</button>
    <div id="regError" style="color: #ff3366; font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px;"></div>
  </div>
</div>

<div id="app" style="display: none;">


<!-- Floating Orbs Background -->
<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- Loader -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">同步数据中...</div>
</div>

<!-- Header -->
<header class="app-header">
  <div class="header-top">
    <h1 class="header-title" id="headerTitle">胸部</h1>
    <div class="header-actions">
      <span class="progress-text" id="progressText">0/0</span>
      <button class="settings-trigger" id="btnStats" aria-label="统计数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </button>
      <button class="settings-trigger" id="btnSettings" aria-label="动作设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 8.4a3.6 3.6 0 1 0 0 7.2 3.6 3.6 0 0 0 0-7.2Z"/>
          <path d="M19 12a7.1 7.1 0 0 0-.1-1.2l2-1.5-2-3.4-2.4 1a7.4 7.4 0 0 0-2-1.2L14.2 3h-4.1l-.4 2.7a7.4 7.4 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.5A7.1 7.1 0 0 0 5.2 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.4-1a7.4 7.4 0 0 0 2 1.2l.4 2.7h4.1l.4-2.7a7.4 7.4 0 0 0 2-1.2l2.4 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2Z"/>

  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</header>

<!-- Tab Panels -->
<main class="tab-panels">
  <section class="tab-panel active" data-part="chest" id="panel-chest"></section>
  <section class="tab-panel" data-part="shoulder" id="panel-shoulder"></section>
  <section class="tab-panel" data-part="legs" id="panel-legs"></section>
  <section class="tab-panel" data-part="back" id="panel-back"></section>
  <section class="tab-panel" data-part="abs" id="panel-abs"></section>
</main>

<!-- FAB -->
<button class="fab" id="fabAdd" aria-label="添加动作">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">添加动作</h2>
    <div class="form-group">
      <label class="form-label">从动作记录选择</label>
      <select class="form-input" id="templateSelect">
        <option value="">选择已添加过的动作</option>
      </select>
      <div class="template-helper">选择后自动带入最近一次组数、次数和重量</div>
    </div>
    <div class="form-group">
      <label class="form-label">动作名称</label>
      <input class="form-input" type="text" id="inputName" list="exerciseList" placeholder="例如：卧推" autocomplete="off">
      <datalist id="exerciseList"></datalist>
    </div>

      <div class="form-group">
        <label class="form-label">组数</label>
        <input class="form-input" type="number" id="inputSets" value="4" min="1" max="20" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">次数</label>
        <input class="form-input" type="number" id="inputReps" value="12" min="1" max="100" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">重量(kg)</label>
        <input class="form-input" type="number" id="inputWeight" value="20" min="0" step="2.5" inputmode="decimal">
      </div>
    </div>
    <button class="btn-save" id="btnSave">保存</button>
  </div>
</div>

<!-- Technique Modal -->
<div class="modal-overlay" id="techniqueModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="settings-top">
      <h2 class="modal-title" id="techniqueTitle">动作要领</h2>
      <button class="sheet-close" id="btnCloseTechnique" aria-label="关闭动作要领">&times;</button>

    <div class="form-group">
      <label class="form-label" for="techniqueInput">动作要领</label>

    </div>
    <button class="btn-save" id="btnSaveTechnique">保存要领</button>
  </div>
</div>

<!-- Settings / Exercise Library -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-sheet settings-sheet">
    <div class="modal-handle"></div>
    <div class="settings-top">
      <h2 class="modal-title">动作设置</h2>

function normalizeTemplates(source = {}) {
  const normalized = {};
  for (const part of PARTS) {
    const templates = Array.isArray(source[part]) ? source[part] : [];
    normalized[part] = [];
    for (const item of templates) {
      const raw = typeof item === 'string' ? { name: item } : (item || {});
      const name = String(raw.name || '').trim();
      if (!name) continue;
      const template = {
        name,
        sets: Math.max(1, parseInt(raw.sets) || 4),
        reps: Math.max(1, parseInt(raw.reps) || 12),
        weight: Math.max(0, parseFloat(raw.weight) || 0),
        technique: String(raw.technique || '').trim()
      };
      const existing = normalized[part].findIndex(t => t.name.toLowerCase() === name.toLowerCase());
      if (existing >= 0) normalized[part][existing] = template;
      else normalized[part].push(template);
    }
  }
  return normalized;
}

function mergeTemplates(custom = {}) {
  const merged = normalizeTemplates(DEFAULT_TEMPLATES);
  const normalizedCustom = normalizeTemplates(custom);
  for (const part of PARTS) {
    if (normalizedCustom[part]) {
      for (const item of normalizedCustom[part]) {
        const existingIdx = merged[part].findIndex(t => t.name.toLowerCase() === item.name.toLowerCase());
        if (existingIdx >= 0) merged[part][existingIdx] = item;
        else merged[part].unshift(item);
      }
    }
  }
  return merged;
}

/* ===============================================================
   IndexedDB CACHE LAYER
   =============================================================== */
const IDBCache = {
  DB_NAME: 'fitness-plan-cache',
  DB_VERSION: 2,

  _open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('kv'))
          db.createObjectStore('kv');
        if (!db.objectStoreNames.contains('workout_history'))
          db.createObjectStore('workout_history', { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  async get(key) {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readonly');
        const r = tx.objectStore('kv').get(key);
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    } catch { return undefined; }
  },

  async set(key, val) {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readwrite');
        tx.objectStore('kv').put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) { console.warn('IDB set error:', e); }
  },

  async addHistory(record) {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('workout_history', 'readwrite');
        tx.objectStore('workout_history').add(record);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) { console.warn('IDB addHistory error:', e); }
  },

  async clearAll() {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(['kv', 'workout_history'], 'readwrite');
        tx.objectStore('kv').clear();
        tx.objectStore('workout_history').clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) { console.warn('IDB clearAll error:', e); }
  },

  async getAllHistory() {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('workout_history', 'readonly');
        const r = tx.objectStore('workout_history').getAll();
        r.onsuccess = () => resolve(r.result || []);
        r.onerror = () => reject(r.error);
      });
    } catch { return []; }
  }
};

/* ===============================================================
   DATA STORE (IndexedDB + Supabase hybrid)
   =============================================================== */
const Store = {
  _d: emptyWorkoutPlan(),
  _custom: mergeTemplates(),
  _lastReset: '',
  _history: [],
  _authMeta: null,

  async init() {
    // 1) 先从 IndexedDB 读取缓存（离线可用 & 快速启动）
    try {
      const cached = await IDBCache.get('fitness_data');
      if (cached) {
        this._d = { ...emptyWorkoutPlan(), ...(cached.exercises || {}) };
        
        this._authMeta = cached.auth_meta || cached.custom_exercises?.__auth || null;
        let custom = cached.custom_exercises || {};
        let count = Object.values(custom).reduce((sum, arr) => sum + (arr ? arr.length : 0), 0);
        // 如果自定义动作库较少（< 15个），说明可能是新用户或之前没有预设数据，使用合并逻辑
        if (count < 15) {
          this._custom = mergeTemplates(custom);
          this.save(); // 存回覆盖
        } else {
          this._custom = normalizeTemplates(custom);
        }
        
        this._lastReset = cached.last_reset || '';
      }
      this._history = await IDBCache.getAllHistory();
    } catch (e) {
      console.warn('IDB read error:', e);
    }

    // 2) 后台拉取 Supabase 最新数据（联网时合并）
    try {
      if (!supabaseClient || IS_LOCAL_AUTH) throw new Error('No supabase client');
      const { data, error } = await supabaseClient
        .from('fitness_data')
        .select('*')
        .eq('user_id', USER_ID)
        .single();

      if (data) {
        // Supabase 数据作为权威来源
        this._d = { ...emptyWorkoutPlan(), ...(data.exercises || {}) };
        this._lastReset = data.last_reset || this._lastReset;
        
        this._authMeta = data.custom_exercises?.__auth || null;
        let remoteCustom = data.custom_exercises || {};
        let count = Object.values(remoteCustom).reduce((sum, arr) => sum + (arr ? arr.length : 0), 0);
        if (count < 15) {
          this._custom = mergeTemplates(remoteCustom);
          this.save(); // 存回覆盖，并同步到远程数据库
        } else {
          this._custom = normalizeTemplates(remoteCustom);
          // 同步到 IndexedDB
          await this._saveToIDB();
        }
      } else {
        await supabaseClient.from('fitness_data').insert([{ user_id: USER_ID }]);
      }
    } catch (e) {
      console.warn('Supabase load error (offline mode):', e);
    }
  },

  load() { return this._d; },

  async _saveToIDB() {
    await IDBCache.set('fitness_data', {
      exercises: this._d,
      custom_exercises: this._custom,
      auth_meta: this._authMeta,
      last_reset: this._lastReset
    });
  },

  save() {
    // 写入 IndexedDB（同步保障）
    this._saveToIDB();

    // 异步写入 Supabase（Optimistic UI）
    if (supabaseClient && !IS_LOCAL_AUTH) {
      supabaseClient.from('fitness_data').update({
        exercises: this._d,
        custom_exercises: { ...this._custom, ...(this._authMeta ? { __auth: this._authMeta } : {}) },
        last_reset: this._lastReset,
        updated_at: new Date().toISOString()
      }).eq('user_id', USER_ID).then(({ error }) => {
        if (error) console.warn('Supabase sync error:', error);
      });
    }
  },

  getTemplates(part) { return this._custom[part] || []; },

  upsertTemplate(part, exercise) {
    if (!this._custom[part]) this._custom[part] = [];
    const template = {
      name: exercise.name,
      sets: exercise.sets,
      reps: exercise.reps,
      weight: exercise.weight,
      technique: exercise.technique || ''
    };
    const idx = this._custom[part].findIndex(t => t.name.toLowerCase() === exercise.name.toLowerCase());
    if (idx >= 0) this._custom[part][idx] = template;
    else this._custom[part].unshift(template);
  },

  removeTemplate(part, name) {
    this._custom[part] = this.getTemplates(part).filter(t => t.name !== name);
    this.save();
  },

  getLastReset() { return this._lastReset; },

  setLastReset(v) {
    this._lastReset = v;
    this.save();
  },

  getHistory() { return this._history; },

  async addHistoryEntry(entry) {
    this._history.push(entry);
    await IDBCache.addHistory(entry);
    // Also sync to Supabase (fire & forget)
    if (supabaseClient && !IS_LOCAL_AUTH) {
      supabaseClient.from('fitness_data').update({
        history: this._history.slice(-90), // keep last 90 entries
        updated_at: new Date().toISOString()
      }).eq('user_id', USER_ID).then(({ error }) => {
        if (error) console.warn('Supabase history sync error:', error);
      });
    }
  }
};

/* ===============================================================
   DAILY RESET (with history snapshot)
   =============================================================== */
function checkReset() {
  const now = new Date();
  const boundary = new Date(now);
  boundary.setHours(2, 0, 0, 0);
  if (now < boundary) boundary.setDate(boundary.getDate() - 1);

  const last = Store.getLastReset();
  const lastDate = last ? new Date(last) : new Date(0);

  if (lastDate < boundary) {
    const data = Store.load();

    // === 保存历史快照 ===
    let anyData = false;
    const snapshot = { date: boundary.toISOString().slice(0, 10), parts: {} };
    for (const p of PARTS) {
      if (data[p] && data[p].length) {
        const completed = data[p].filter(ex =>
          ex.completedSets && ex.completedSets.some(Boolean)
        );
        if (completed.length) {
          anyData = true;
          snapshot.parts[p] = completed.map(ex => ({
            name: ex.name,
            sets: ex.sets,
            reps: ex.reps,
            weight: ex.weight,
            done: ex.completedSets ? ex.completedSets.filter(Boolean).length : 0
          }));
        }
      }
    }
    if (anyData) {
      Store.addHistoryEntry(snapshot);
    }

    // === 重置所有组 ===
    for (const p of PARTS) {
      if (data[p]) for (const ex of data[p]) {
        if (ex.completedSets) {
          ex.completedSets = ex.completedSets.map(() => false);
        }
      }
    }
    Store.setLastReset(now.toISOString());
  }
}

  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderExercises(part) {
  const panel = document.getElementById('panel-' + part);
  const exercises = Store.load()[part];

  if (!exercises || !exercises.length) {
    panel.innerHTML = `
      <div class="empty-state">
        <img class="empty-illustration" src="assets/illustrations/empty-workout-illustration.webp" width="292" height="320" alt="" draggable="false">
        <p>还没有训练动作<br>点击 <strong>+</strong> 添加</p>
      </div>`;
    return;
  }

  panel.innerHTML = exercises.map((ex, i) => {
    const totalSets = (ex.sets || 0) + 2;
    let completedSets = ex.completedSets;
    if (!completedSets || completedSets.length !== totalSets) {
      const old = completedSets || [];
      completedSets = Array(totalSets).fill(false);
      for(let j=0; j<Math.min(totalSets, old.length); j++) completedSets[j] = old[j];
      ex.completedSets = completedSets;
    }
    const done = completedSets.filter(Boolean).length;
    const progressDone = Math.min(done, ex.sets);
    const allDone = progressDone === ex.sets;
    const hasTechnique = Boolean((ex.technique || '').trim());
    return `<div class="exercise-card${allDone ? ' all-done' : ''}" data-idx="${i}" style="animation-delay:${i * 0.07}s">
      <div class="card-header">
        <span class="card-name">${esc(ex.name)}</span>
        <span class="card-weight">${ex.weight}kg</span>
        <button class="technique-btn${hasTechnique ? ' has-note' : ''}" data-action="technique" data-idx="${i}">动作要领</button>
        <button class="btn-delete" data-action="delete" data-idx="${i}" aria-label="删除">&times;</button>
      </div>
      <div class="card-info">${ex.reps} 次 × ${ex.sets} 组 (+2 过量组)</div>
      <div class="set-row">
        ${completedSets.map((s, si) => {
          const isBonus = si >= ex.sets;
          const bonusClass = isBonus ? ' bonus' : '';
          return `<div class="set-circle${s ? ' done' : ''}${bonusClass}" data-action="toggle" data-ex="${i}" data-set="${si}">${s ? '✓' : (si + 1)}</div>`;
        }).join('')}
      </div>
      <div class="card-footer">
        <span class="card-progress">${done}/${ex.sets} 组</span>
        <span class="card-pct">${ex.sets ? Math.round(progressDone / ex.sets * 100) : 0}%</span>
      </div>
    </div>`;
  }).join('');
}

/* ===============================================================
   UI: TOGGLE SET (with effects)
   =============================================================== */
function toggleSet(exIdx, setIdx) {
  const data = Store.load();
  const ex = data[activeTab][exIdx];
  const totalSets = (ex.sets || 0) + 2;
  if (!ex.completedSets || ex.completedSets.length !== totalSets) {
    const old = ex.completedSets || [];
    ex.completedSets = Array(totalSets).fill(false);
    for (let j = 0; j < Math.min(totalSets, old.length); j++) ex.completedSets[j] = old[j];
  }

  const wasComplete = ex.completedSets.filter(Boolean).length >= ex.sets;
  const isCurrentlyDone = ex.completedSets[setIdx];
  let targetIdx = setIdx;

  if (!isCurrentlyDone) {
    // 点击未点亮的组，总是点亮第一个未点亮的组
    targetIdx = ex.completedSets.indexOf(false);
  } else {
    // 点击已点亮的组，总是熄灭最后一个已点亮的组
    targetIdx = ex.completedSets.lastIndexOf(true);
  }

  if (targetIdx === -1) return;

  ex.completedSets[targetIdx] = !ex.completedSets[targetIdx];
  Store.save();

  const card = document.querySelectorAll('.tab-panel.active .exercise-card')[exIdx];
  if (!card) return;

  const circle = card.querySelectorAll('.set-circle')[targetIdx];
  const justDone = ex.completedSets[targetIdx];
  circle.classList.toggle('done', justDone);
  circle.textContent = justDone ? '✓' : (targetIdx + 1);

  // Pop animation
  circle.style.animation = 'none';
  void circle.offsetHeight;
  circle.style.animation = 'pop 0.35s cubic-bezier(0.34,1.56,0.64,1)';

  // Ripple inside circle
  if (justDone) {
    createRipple(circle);
    particleBurst(circle);
  }

  // Update footer
  const done = ex.completedSets.filter(Boolean).length;
  const progressDone = Math.min(done, ex.sets);
  card.querySelector('.card-progress').textContent = `${done}/${ex.sets} 组`;
  card.querySelector('.card-pct').textContent = `${ex.sets ? Math.round(progressDone / ex.sets * 100) : 0}%`;

  const allDone = progressDone === ex.sets;
  card.classList.toggle('all-done', allDone);

  // Celebrate if just completed all sets!
  if (allDone && !wasComplete) {
    card.classList.remove('celebrate');
    void card.offsetHeight;
    card.classList.add('celebrate');
    const rect = card.getBoundingClientRect();
    launchConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
    showToast('🎉 全部完成！太强了！');
  }

  updateProgress(activeTab);
}

/* ===============================================================
   UI: PROGRESS
   =============================================================== */
function updateProgress(part) {
  const exercises = Store.load()[part];
  let totalSets = 0, doneForPct = 0, doneActual = 0;
  if (exercises) {
    for (const ex of exercises) {
      totalSets += ex.sets;
      if (ex.completedSets) {
        const d = ex.completedSets.filter(Boolean).length;
        doneActual += d;
        doneForPct += Math.min(d, ex.sets);
      }
    }
  }
  const pct = totalSets ? Math.round(doneForPct / totalSets * 100) : 0;
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');

  fill.style.width = pct + '%';

  const newText = totalSets ? `${doneActual}/${totalSets} 组 · ${pct}%` : '暂无动作';
  if (text.textContent !== newText) {
    text.textContent = newText;
    text.classList.remove('pop');
    void text.offsetHeight;
    text.classList.add('pop');
  }
}

/* ===============================================================
   UI: STATS & CALENDAR
   =============================================================== */
let currentCalDate = new Date();
let selectedDateStr = null;

function calculateStats() {
  const history = Store.getHistory();
  const now = new Date();
  
  // Natural Week (Monday as start)
  const dayOfWeek = now.getDay() || 7; 
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dayOfWeek + 1);
  weekStart.setHours(0,0,0,0);
  
  // Natural Month
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  
  let weekDays = new Set();
  let monthDays = new Set();
  
  history.forEach(h => {
    const hDate = new Date(h.date + 'T00:00:00');
    if (hDate >= weekStart) weekDays.add(h.date);
    if (hDate >= monthStart) monthDays.add(h.date);
  });
  
  document.getElementById('statWeekDays').textContent = weekDays.size;
  document.getElementById('statMonthDays').textContent = monthDays.size;
}

function renderCalendar() {
  const year = currentCalDate.getFullYear();
  const month = currentCalDate.getMonth();
  
  document.getElementById('calendarTitle').textContent = `${year}年${month + 1}月`;
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  
  let firstDayOfWeek = firstDay.getDay() || 7; // Monday = 1
  
  const history = Store.getHistory();
  const historyDates = new Set(history.map(h => h.date));
  
  let html = '';
  // Empty cells before start of month
  for (let i = 1; i < firstDayOfWeek; i++) {
    html += `<div class="calendar-cell empty"></div>`;
  }
  
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasRecord = historyDates.has(dStr);
    const isSelected = selectedDateStr === dStr;
    const classes = ['calendar-cell'];
    if (hasRecord) classes.push('has-record');
    if (isSelected) classes.push('selected');
    
    html += `<div class="${classes.join(' ')}" onclick="selectDate('${dStr}')">${d}</div>`;
  }
  
  document.getElementById('calendarDates').innerHTML = html;
  renderDayDetails();
}

function selectDate(dateStr) {
  selectedDateStr = dateStr;
  renderCalendar(); // re-render to update selected styling
}

function renderDayDetails() {
  const container = document.getElementById('dayDetailsContainer');
  if (!selectedDateStr) {
    container.innerHTML = '';
    return;
  }
  
  const history = Store.getHistory();
  const record = history.find(h => h.date === selectedDateStr);
  
  if (!record) {
    container.innerHTML = `<div class="day-empty">这天没有训练记录</div>`;
    return;
  }
  
  let html = `<div class="day-details"><div class="day-details-title">${selectedDateStr} 训练记录</div>`;
  
  for (const part of PARTS) {
    if (record.parts[part] && record.parts[part].length > 0) {
      html += `<div style="font-size: 12px; margin-top: 10px; color: var(--text-dim);">${LABELS[part]}</div>`;
      for (const ex of record.parts[part]) {
        html += `
          <div class="day-detail-item">
            <div class="day-detail-name">${esc(ex.name)}</div>
            <div class="day-detail-stats">${ex.weight}kg · ${ex.done}/${ex.sets} 组</div>
          </div>
        `;
      }
    }
  }
  
  html += `</div>`;
  container.innerHTML = html;
}

function openStats() {
  calculateStats();
  currentCalDate = new Date();
  selectedDateStr = currentCalDate.toISOString().slice(0,10);
  renderCalendar();
  document.getElementById('statsModal').classList.add('open');
}

function closeStats() {
  document.getElementById('statsModal').classList.remove('open');
}

/* ===============================================================
   ANIMATIONS: PARTICLE BURST
   =============================================================== */
function particleBurst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const count = 10;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle-burst';
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const dist = 25 + Math.random() * 25;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${accent};
      --tx:${tx}px; --ty:${ty}px;
      width:${3 + Math.random() * 4}px;
      height:${3 + Math.random() * 4}px;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

/* ===============================================================
   ANIMATIONS: RIPPLE
   =============================================================== */
function createRipple(el) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(el.offsetWidth, el.offsetHeight);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = '0px';
  ripple.style.top = '0px';
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

/* ===============================================================
   ANIMATIONS: CONFETTI (Canvas)
   =============================================================== */
function launchConfetti(x, y) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:9998;pointer-events:none';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const colors = ['#ff3366','#ff9933','#00e676','#2979ff','#ffeb3b','#e040fb','#fff'];
  const particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: x || canvas.width / 2,
      y: y || canvas.height / 2,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 0.5) * 14 - 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 7 + 3,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      gravity: 0.18,
      opacity: 1,
      decay: 0.012 + Math.random() * 0.018
    });
  }

  let frame;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;
      p.vx *= 0.99;
      p.rotation += p.rotSpeed;
      p.opacity -= p.decay;
      if (p.opacity <= 0) continue;
      alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      // Mix rectangles and circles
      if (p.size > 6) {
        ctx.fillRect(-p.size / 2, -p.size * 0.3, p.size, p.size * 0.6);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (alive) frame = requestAnimationFrame(animate);
    else canvas.remove();
  }
  frame = requestAnimationFrame(animate);
}

/* ===============================================================
   INIT
   =============================================================== */

let isAppInitialized = false;

function resetLocalState() {
  Store._d = emptyWorkoutPlan();
  Store._custom = mergeTemplates();
  Store._lastReset = '';
  Store._history = [];
  Store._authMeta = null;
}

function normalizeAccount(account) {
  return account.trim().toLowerCase();
}

async function hashText(text) {
  if (window.crypto?.subtle) {
    const data = new TextEncoder().encode(text);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(digest))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }
  let hash = 2166136261;
  for (let i = 0; i < text.length; i++) {
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(16).padStart(8, '0');
}

async function accountToUserId(account) {
  const normalized = account.trim().toLowerCase();
  const hash = await hashText(`fitness-plan-account:${normalized}`);
  return `acct_${hash.slice(0, 40)}`;
}

async function passwordHashFor(account, password) {
  return hashText(`fitness-plan-password:${normalizeAccount(account)}:${password}`);
}

function getAuthSession() {
  try {
    return JSON.parse(localStorage.getItem(AUTH_SESSION_KEY) || 'null');
  } catch {
    return null;
  }
}

function setAuthSession(session) {
  localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(session));
}

function clearAuthSession() {
  localStorage.removeItem(AUTH_SESSION_KEY);
}

function getLocalAccounts() {
  try {
    return JSON.parse(localStorage.getItem(LOCAL_ACCOUNTS_KEY) || '{}');
  } catch {
    return {};
  }
}

function saveLocalAccounts(accounts) {
  localStorage.setItem(LOCAL_ACCOUNTS_KEY, JSON.stringify(accounts));
}

async function localUserIdFor(account) {
  const hash = await hashText(`fitness-plan-local-account:${normalizeAccount(account)}`);
  return `local_${hash.slice(0, 40)}`;
}

function isRlsError(error) {
  const msg = String(error?.message || error || '').toLowerCase();
  return msg.includes('row-level security') || msg.includes('401') || msg.includes('rls');
}

async function fetchAccountRecord(userId) {
  const { data, error } = await supabaseClient
    .from('fitness_data')
    .select('*')
    .eq('user_id', userId)
    .single();
  if (error && !data) return null;
  return data || null;
}

async function showAuthenticatedApp(userId, localOnly = false) {
  USER_ID = userId;
  IS_LOCAL_AUTH = localOnly;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await initializeApp();
}

async function initializeApp() {
  if (isAppInitialized) return;
  isAppInitialized = true;
  
  try {
    await Store.init();
  } catch (err) {
    console.error('Init error:', err);
  } finally {
    const loader = document.getElementById('loader');
    if (loader) {
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 400);
    }
  }

  try { checkReset(); } catch (e) { console.error('Reset error:', e); }
  try { PARTS.forEach(p => renderExercises(p)); } catch (e) { console.error('Render error:', e); }
  switchTab('chest');
}

document.addEventListener('DOMContentLoaded', async () => {
  if (!supabaseClient) {
    // Offline / No SDK
    USER_ID = 'offline_user';
    document.getElementById('app').style.display = 'block';
    initializeApp();
  } else {
    const session = getAuthSession();
    if (session?.user_id) {
      await showAuthenticatedApp(session.user_id, Boolean(session.local_only));
    } else {
      USER_ID = null;
      IS_LOCAL_AUTH = false;
      document.getElementById('app').style.display = 'none';
      document.getElementById('authScreen').style.display = 'flex';
      resetLocalState();
      await IDBCache.clearAll();
    }
  }

  // Auth Events
  document.getElementById('btnAuthLogin')?.addEventListener('click', async () => {
    const account = document.getElementById('authAccount').value.trim();
    const password = document.getElementById('authPassword').value;
    const errEl = document.getElementById('authError');
    if (!account || !password) return errEl.textContent = '请输入账号和密码';
    errEl.textContent = '登录中...';
    
    try {
      const userId = await accountToUserId(account);
      const record = await fetchAccountRecord(userId);
      const expected = record?.custom_exercises?.__auth?.password_hash;
      const actual = await passwordHashFor(account, password);
      if (expected && expected === actual) {
        errEl.textContent = '';
        setAuthSession({ user_id: userId, account: account.trim(), local_only: false });
        await IDBCache.clearAll();
        await showAuthenticatedApp(userId, false);
        return;
      }

      const accounts = getLocalAccounts();
      const local = accounts[normalizeAccount(account)];
      if (local?.password_hash === actual) {
        errEl.textContent = '';
        setAuthSession({ user_id: local.user_id, account: account.trim(), local_only: true });
        await IDBCache.clearAll();
        await showAuthenticatedApp(local.user_id, true);
        return;
      }

      errEl.textContent = '登录失败: 账号或密码不正确';
    } catch (error) {
      errEl.textContent = '登录失败: ' + (error?.message || '网络异常');
    }
  });

  document.getElementById('btnShowRegister')?.addEventListener('click', () => {
    document.getElementById('registerModal').classList.add('open');
  });

  document.getElementById('btnCloseRegister')?.addEventListener('click', () => {
    document.getElementById('registerModal').classList.remove('open');
    document.getElementById('regError').textContent = '';
  });
  
  document.getElementById('registerModal')?.addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      document.getElementById('registerModal').classList.remove('open');
      document.getElementById('regError').textContent = '';
    }
  });

  document.getElementById('btnSubmitRegister')?.addEventListener('click', async () => {
    const account = document.getElementById('regAccount').value.trim();
    const password = document.getElementById('regPassword').value;
    const errEl = document.getElementById('regError');
    
    if (!account || !password) return errEl.textContent = '请输入账号和密码';
    if (password.length < 6) return errEl.textContent = '密码至少需要 6 位';
    
    errEl.textContent = '注册中...';
    try {
      const userId = await accountToUserId(account);
      const existing = await fetchAccountRecord(userId);
      if (existing?.custom_exercises?.__auth) {
        errEl.textContent = '注册失败: 账号已存在';
        return;
      }
      const authMeta = {
        account: account.trim(),
        password_hash: await passwordHashFor(account, password),
        created_at: new Date().toISOString()
      };
      if (existing) {
        const custom = { ...(existing.custom_exercises || {}), __auth: authMeta };
        const { error } = await supabaseClient
          .from('fitness_data')
          .update({ custom_exercises: custom, updated_at: new Date().toISOString() })
          .eq('user_id', userId);
        if (error) throw error;
      } else {
        const { error } = await supabaseClient.from('fitness_data').insert([{
          user_id: userId,
          exercises: emptyWorkoutPlan(),
          custom_exercises: { __auth: authMeta }
        }]);
        if (error) throw error;
      }
      clearAuthSession();
      IS_LOCAL_AUTH = false;
      resetLocalState();
      await IDBCache.clearAll();
      errEl.textContent = '注册成功！';
      setTimeout(() => {
        document.getElementById('registerModal').classList.remove('open');
        document.getElementById('authAccount').value = account;
        document.getElementById('authPassword').value = password;
      }, 1000);
    } catch (error) {
      if (!isRlsError(error)) {
        errEl.textContent = '注册失败: ' + (error?.message || '网络异常');
        return;
      }

      const key = normalizeAccount(account);
      const accounts = getLocalAccounts();
      if (accounts[key]) {
        errEl.textContent = '注册失败: 账号已存在';
        return;
      }
      const localUserId = await localUserIdFor(account);
      accounts[key] = {
        user_id: localUserId,
        account: account.trim(),
        password_hash: await passwordHashFor(account, password),
        created_at: new Date().toISOString()
      };
      saveLocalAccounts(accounts);
      clearAuthSession();
      IS_LOCAL_AUTH = true;
      resetLocalState();
      await IDBCache.clearAll();
      errEl.textContent = '注册成功！';
      setTimeout(() => {
        document.getElementById('registerModal').classList.remove('open');
        document.getElementById('authAccount').value = account;
        document.getElementById('authPassword').value = password;
      }, 1000);
    }
  });

  document.getElementById('btnLogout')?.addEventListener('click', async () => {
    closeSettings();
    clearAuthSession();
    resetLocalState();
    await IDBCache.clearAll();
    isAppInitialized = false;
    USER_ID = null;
    IS_LOCAL_AUTH = false;
    document.getElementById('app').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
  });

  // Tab bar events
  document.getElementById('tabBar').addEventListener('click', e => {
    const tab = e.target.closest('.tab-item');
    if (tab) switchTab(tab.dataset.tab);
  });

  // Exercise panel events (delegation)
  document.querySelector('.tab-panels').addEventListener('click', e => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    if (t.dataset.action === 'toggle') toggleSet(+t.dataset.ex, +t.dataset.set);
    else if (t.dataset.action === 'delete') deleteExercise(+t.dataset.idx);
    else if (t.dataset.action === 'technique') openTechniqueEditor(+t.dataset.idx);
  });

  // FAB
  document.getElementById('fabAdd').addEventListener('click', openModal);
  document.getElementById('btnSettings').addEventListener('click', openSettings);
  document.getElementById('btnStats').addEventListener('click', openStats);

  // Stats Modal
  document.getElementById('btnCloseStats').addEventListener('click', closeStats);
  document.getElementById('statsModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeStats();
  });
  document.getElementById('btnPrevMonth').addEventListener('click', () => {
    currentCalDate.setMonth(currentCalDate.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('btnNextMonth').addEventListener('click', () => {
    currentCalDate.setMonth(currentCalDate.getMonth() + 1);
    renderCalendar();
  });

  // Modal
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('btnSave').addEventListener('click', saveExercise);
  document.getElementById('templateSelect').addEventListener('change', e => {
    if (e.target.value) applyTemplate(e.target.value);
  });

  // Technique modal
  document.getElementById('btnCloseTechnique').addEventListener('click', closeTechniqueEditor);
  document.getElementById('btnSaveTechnique').addEventListener('click', saveTechnique);
  document.getElementById('techniqueModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeTechniqueEditor();
  });

  // Settings / remembered exercise templates
  document.getElementById('btnCloseSettings').addEventListener('click', closeSettings);
  document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSettings();
  });
  document.getElementById('settingsParts').addEventListener('click', e => {
    const btn = e.target.closest('[data-settings-part]');
    if (!btn) return;
    settingsPart = btn.dataset.settingsPart;
    setAccent(settingsPart);
    renderSettings();
  });
  document.getElementById('libraryList').addEventListener('click', e => {
    const use = e.target.closest('[data-template-use]');
    if (use) {
      useTemplateFromSettings(decodeURIComponent(use.dataset.templateUse));
      return;
    }
    const remove = e.target.closest('[data-template-remove]');
    if (!remove) return;
    const name = decodeURIComponent(remove.dataset.templateRemove);
    if (!confirm(`删除动作记录「${name}」？`)) return;
    Store.removeTemplate(settingsPart, name);
    renderSettings();
    showToast('已删除动作记录');
  });

  // Keyboard nav in form
  document.getElementById('inputName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inputSets').focus();
  });
  document.getElementById('inputWeight').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveExercise();
  });

  // Recalculate tab indicator on resize
  window.addEventListener('resize', () => moveTabIndicator(activeTab));
});
</script>
</body>
</html>
