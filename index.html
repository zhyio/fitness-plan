<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="极简云同步健身计划 — 记录训练、跟踪进度、查看历史">
<title>健身计划 | Fitness Plan</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/app-icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ========== DESIGN TOKENS ========== */
:root {
  --bg-primary: #0a0a0f;
  --bg-card: rgba(20, 20, 30, 0.6);
  --bg-card-hover: rgba(30, 30, 45, 0.8);
  --border-card: rgba(255, 255, 255, 0.05);
  --text-primary: #f0f0f5;
  --text-secondary: rgba(255, 255, 255, 0.6);
  --text-dim: rgba(255, 255, 255, 0.3);
  --accent-chest: #ff3366;
  --accent-shoulder: #ff9933;
  --accent-legs: #00e676;
  --accent-back: #2979ff;
  --accent-abs: #00d7c7;
  --accent-history: #e040fb;
  --accent: var(--accent-chest);
  --accent-glow: rgba(255, 51, 102, 0.25);
  --radius: 20px;
  --radius-sm: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --tab-h: 64px;
}

/* ========== RESET ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ========== GLOBAL ========== */
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
  position: relative;
}

/* ========== FLOATING ORBS BACKGROUND ========== */
.bg-orbs {
  position: fixed; inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.13;
  will-change: transform;
}
.bg-orb:nth-child(1) {
  width: min(350px, 80vw); height: min(350px, 80vw);
  background: var(--accent-chest);
  top: -10%; left: -10%;
  animation: orbFloat1 28s infinite ease-in-out;
}
.bg-orb:nth-child(2) {
  width: min(280px, 65vw); height: min(280px, 65vw);
  background: var(--accent-back);
  bottom: 15%; right: -15%;
  animation: orbFloat2 32s infinite ease-in-out;
}
.bg-orb:nth-child(3) {
  width: min(220px, 55vw); height: min(220px, 55vw);
  background: var(--accent-legs);
  top: 45%; left: 25%;
  animation: orbFloat3 24s infinite ease-in-out;
}
@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(40px, 60px) scale(1.05); }
  50% { transform: translate(-30px, 90px) scale(0.95); }
  75% { transform: translate(50px, 25px) scale(1.02); }
}
@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(-50px, -40px) scale(1.08); }
  50% { transform: translate(35px, -70px) scale(0.92); }
  75% { transform: translate(-25px, 50px) scale(1.04); }
}
@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(70px, -50px) scale(1.1); }
  66% { transform: translate(-40px, 60px) scale(0.9); }
}

/* ========== KEYFRAME ANIMATIONS ========== */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.92) translateY(16px); filter: blur(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}
@keyframes pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); }
  100% { transform: scale(1); }
}
@keyframes fabIn {
  from { transform: scale(0) rotate(-120deg); opacity: 0; }
  to   { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes shimmer {
  from { background-position: -200% 0; }
  to   { background-position: 200% 0; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes neonPulse {
  0%, 100% { box-shadow: 0 4px 24px var(--accent-glow); }
  50%      { box-shadow: 0 4px 36px var(--accent-glow), 0 0 60px var(--accent-glow); }
}
@keyframes bounceIn {
  0%   { transform: scale(0.3); opacity: 0; }
  50%  { transform: scale(1.08); }
  70%  { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes rippleAnim {
  to { transform: scale(2.5); opacity: 0; }
}
@keyframes particleBurstAnim {
  0%   { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}
@keyframes numberPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
@keyframes emptyArtworkFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-5px) scale(1.02); }
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ========== LOADER ========== */
.loader-overlay {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.4s ease-out;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
.loader-text {
  color: var(--text-secondary);
  font-size: 14px;
  letter-spacing: 0.5px;
}

/* ========== HEADER ========== */
.app-header {
  position: sticky; top: 0; z-index: 50;
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  background: linear-gradient(to bottom, var(--bg-primary) 50%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.header-top {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.header-title {
  font-size: clamp(22px, 6vw, 28px);
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--text-primary) 70%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.progress-text {
  font-size: 13px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  transition: transform 0.3s;
}
.progress-text.pop {
  animation: numberPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-trigger {
  width: 34px;
  height: 34px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 11px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.15s;
}
.settings-trigger svg { width: 18px; height: 18px; }
.settings-trigger:active {
  color: var(--accent);
  border-color: var(--accent-glow);
  background: var(--accent-glow);
  transform: scale(0.94);
}

/* ========== PROGRESS BAR (LIQUID STYLE) ========== */
.progress-bar {
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent), white 25%));
  box-shadow: 0 0 14px var(--accent-glow);
  width: 0%;
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}
.progress-fill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(0,0,0,0.15) 100%);
}
.progress-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  background-size: 200% 100%;
  animation: shimmer 2s infinite linear;
}

/* ========== TAB PANELS ========== */
.tab-panels {
  padding: 4px clamp(12px, 4vw, 20px) 16px;
  position: relative;
  z-index: 1;
}
.tab-panel {
  display: none;
  animation: fadeSlideIn 0.35s ease-out;
}
.tab-panel.active {
  display: block;
}

/* ========== EXERCISE CARDS ========== */
.exercise-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-card);
  border-radius: var(--radius);
  padding: clamp(14px, 4vw, 20px);
  margin-bottom: 12px;
  animation: cardIn 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
  position: relative;
  overflow: hidden;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  touch-action: manipulation;
}
.exercise-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  background: var(--accent);
  opacity: 0.25;
  transition: opacity 0.4s, box-shadow 0.4s;
}
.exercise-card:active {
  background: var(--bg-card-hover);
  transform: scale(0.985);
}
.exercise-card.all-done {
  border-color: var(--accent);
  box-shadow: 0 0 24px var(--accent-glow), inset 0 0 30px var(--accent-glow);
}
.exercise-card.all-done::before {
  opacity: 1;
  box-shadow: 0 0 18px var(--accent);
}
.exercise-card.celebrate {
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.card-header {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 6px;
}
.card-name {
  flex: 1;
  font-size: clamp(15px, 4vw, 17px);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-weight {
  font-size: 13px; font-weight: 600;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 3px 10px;
  border-radius: 8px;
  white-space: nowrap;
}
.btn-delete {
  background: none; border: none;
  color: var(--text-dim);
  font-size: 22px; cursor: pointer;
  padding: 4px 6px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
  touch-action: manipulation;
}
.btn-delete:hover, .btn-delete:active {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.12);
}
.card-info {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

/* ========== SET CIRCLES ========== */
.set-row {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(6px, 2vw, 10px);
  margin-bottom: 12px;
}
.set-circle {
  width: clamp(36px, 10vw, 44px);
  height: clamp(36px, 10vw, 44px);
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: clamp(12px, 3.5vw, 14px);
  font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  touch-action: manipulation;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.set-circle.done {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 4px 16px var(--accent-glow);
}
/* Ripple inside circle */
.set-circle .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0);
  animation: rippleAnim 0.5s ease-out forwards;
  pointer-events: none;
}

.card-footer {
  display: flex; align-items: center;
  justify-content: space-between;
}
.card-progress {
  font-size: 12px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}
.card-pct {
  font-size: 12px; font-weight: 600;
  color: var(--accent);
}

/* ========== PARTICLE BURST ========== */
.particle-burst {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  animation: particleBurstAnim 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  animation: fadeSlideIn 0.5s ease-out;
}
.empty-illustration {
  display: block;
  width: min(132px, 38vw);
  height: auto;
  margin: 0 auto 18px;
  filter: drop-shadow(0 12px 22px rgba(224, 64, 251, 0.18));
  animation: emptyArtworkFloat 4s infinite ease-in-out;
  user-select: none;
  -webkit-user-drag: none;
}
.empty-state p {
  font-size: 14px;
  line-height: 1.7;
}

/* ========== FAB ========== */
.fab {
  position: fixed;
  bottom: calc(var(--tab-h) + var(--safe-bottom) + 18px);
  right: clamp(16px, 5vw, 24px);
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff; border: none;
  font-size: 30px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px var(--accent-glow);
  cursor: pointer; z-index: 60;
  transition: background 0.3s, transform 0.15s;
  animation: fabIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s backwards,
             neonPulse 3s infinite 1s;
  touch-action: manipulation;
}
.fab:active { transform: scale(0.88); }
.fab.hidden { display: none; }

/* ========== BOTTOM TAB BAR ========== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  display: flex;
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-top: 1px solid rgba(255,255,255,0.04);
  z-index: 100;
  position: fixed;
}
.tab-item {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  color: var(--text-dim);
  background: none; border: none;
  cursor: pointer;
  transition: color 0.3s;
  touch-action: manipulation;
  font-family: inherit;
  position: relative;
}
.tab-item.active {
  color: var(--accent);
}
.tab-icon {
  width: 25px; height: 25px;
  overflow: visible;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
              filter 0.3s ease;
}
.tab-icon .icon-accent {
  opacity: 0.1;
  transition: opacity 0.3s ease, fill 0.3s ease;
}
.tab-icon .icon-cheek {
  fill: currentColor;
  opacity: 0.34;
  transition: opacity 0.3s ease;
}
.tab-item.active .tab-icon {
  transform: translateY(-2px) scale(1.1);
  filter: drop-shadow(0 0 6px var(--accent-glow));
}
.tab-item.active .tab-icon .icon-accent {
  opacity: 0.28;
}
.tab-item.active .tab-icon .icon-cheek {
  opacity: 0.95;
}
.tab-label { font-size: 10px; font-weight: 500; }

/* Tab Slide Indicator */
.tab-indicator {
  position: absolute;
  top: 0; left: 0;
  height: 3px;
  background: var(--accent);
  border-radius: 0 0 4px 4px;
  transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
              width 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
              background 0.4s;
  box-shadow: 0 4px 14px var(--accent);
  z-index: 101;
}

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  opacity: 0; visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, #1a1a2e 0%, #141420 100%);
  border-radius: 24px 24px 0 0;
  padding: 20px clamp(16px, 5vw, 24px) calc(24px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 201;
  max-height: 85dvh;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.15);
  margin: 0 auto 18px;
}
.modal-title {
  font-size: clamp(17px, 5vw, 20px);
  font-weight: 700;
  margin-bottom: 20px;
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}
.form-input {
  width: 100%;
  height: 48px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 16px;
  padding: 0 14px;
  font-family: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.form-input::placeholder { color: var(--text-dim); }
.template-helper {
  margin-top: 6px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--text-dim);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
@media (max-width: 340px) {
  .form-row {
    grid-template-columns: 1fr 1fr;
  }
  .form-row .form-group:last-child {
    grid-column: 1 / -1;
  }
}
.btn-save {
  width: 100%;
  height: 50px;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent), white 15%));
  color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  font-family: inherit;
  margin-top: 4px;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-save:active { transform: scale(0.96); }

/* ========== SETTINGS / EXERCISE LIBRARY ========== */
.settings-sheet { min-height: min(64dvh, 520px); }
.settings-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.settings-top .modal-title { margin-bottom: 0; }
.sheet-close {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
}
.settings-copy {
  color: var(--text-secondary);
  font-size: 13px;
  line-height: 1.55;
  margin-bottom: 16px;
}
.settings-parts {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 12px;
  margin-bottom: 4px;
  scrollbar-width: none;
}
.settings-parts::-webkit-scrollbar { display: none; }
.settings-part-btn {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  padding: 7px 13px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
}
.settings-part-btn.active {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 3px 14px var(--accent-glow);
}
.library-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 12px 12px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-card);
  background: var(--bg-card);
  margin-bottom: 8px;
}
.library-item-main { flex: 1; min-width: 0; }
.library-item-name {
  display: block;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.library-item-detail {
  display: block;
  color: var(--text-secondary);
  font-size: 12px;
  margin-top: 4px;
}
.library-actions {
  display: flex;
  gap: 6px;
}
.library-use,
.library-remove {
  border: none;
  border-radius: 9px;
  padding: 8px 10px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
.library-use {
  color: var(--accent);
  background: var(--accent-glow);
}
.library-remove {
  color: #ff8094;
  background: rgba(255, 51, 102, 0.1);
}
.library-empty {
  padding: 44px 18px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.65;
}

/* ========== HISTORY PANEL ========== */
.history-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.stat-card {
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-sm);
  padding: clamp(12px, 3vw, 18px) 8px;
  text-align: center;
  animation: cardIn 0.4s ease-out backwards;
}
.stat-card:nth-child(2) { animation-delay: 0.08s; }
.stat-card:nth-child(3) { animation-delay: 0.16s; }
.stat-value {
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 700;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.stat-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.history-filter {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.history-filter::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s;
  font-family: inherit;
  touch-action: manipulation;
}
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 12px var(--accent-glow);
}

.history-day {
  margin-bottom: 16px;
  animation: slideRight 0.4s ease-out backwards;
}
.history-date {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  padding-left: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.history-date-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  background: var(--accent-glow);
  color: var(--accent);
}
.history-item {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 8px;

}
.history-item-left {

}
.history-item-name {
  font-size: 14px;
  font-weight: 600;
}

}

.history-empty {

/* ========== SCROLLBAR ========== */

/* ========== TOAST ========== */

</style>

<script>
/* ===============================================================
   CONFIG
   =============================================================== */
const SUPABASE_URL = 'https://owqhouyafggdzgcqwlji.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QgsSE7ZoIfcaPsJLlkfS5w_tGvRz_I6';
const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;
if (!supabaseClient) console.warn('Supabase SDK not loaded — running in offline mode.');
const USER_ID = 'default_user';

const PARTS = ['chest', 'shoulder', 'legs', 'back', 'abs'];
const ALL_TABS = ['chest', 'shoulder', 'legs', 'back', 'abs'];
const LABELS = { chest:'胸部', shoulder:'肩部', legs:'腿部', back:'背部', abs:'腹部' };
const COLORS = { chest:'#ff3366', shoulder:'#ff9933', legs:'#00e676', back:'#6366f1', abs:'#00d7c7', stats:'#e040fb' };
const GLOWS  = {
  chest:'rgba(255,51,102,0.2)', shoulder:'rgba(255,153,51,0.2)',
  legs:'rgba(0,230,118,0.2)', back:'rgba(99,102,241,0.2)',
  abs:'rgba(0,215,199,0.2)', stats:'rgba(224,64,251,0.2)'
};

function emptyWorkoutPlan() {
  return { chest:[], shoulder:[], legs:[], back:[], abs:[] };
}

function normalizeTemplates(source = {}) {
  const normalized = {};
  for (const part of PARTS) {
    const templates = Array.isArray(source[part]) ? source[part] : [];
    normalized[part] = [];
    for (const item of templates) {
      const raw = typeof item === 'string' ? { name: item } : (item || {});
      const name = String(raw.name || '').trim();
      if (!name) continue;
      const template = {
        name,
        sets: Math.max(1, parseInt(raw.sets) || 4),
        reps: Math.max(1, parseInt(raw.reps) || 12),
        weight: Math.max(0, parseFloat(raw.weight) || 0)
      };
      const existing = normalized[part].findIndex(t => t.name.toLowerCase() === name.toLowerCase());
      if (existing >= 0) normalized[part][existing] = template;
      else normalized[part].push(template);
    }
  }
  return normalized;
}

/* ===============================================================
   IndexedDB CACHE LAYER
   =============================================================== */
const IDBCache = {
  DB_NAME: 'fitness-plan-cache',
  DB_VERSION: 2,

  _open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('kv'))
          db.createObjectStore('kv');
        if (!db.objectStoreNames.contains('workout_history'))
          db.createObjectStore('workout_history', { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },

  async get(key) {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readonly');
        const r = tx.objectStore('kv').get(key);
        r.onsuccess = () => resolve(r.result);
        r.onerror = () => reject(r.error);
      });
    } catch { return undefined; }
  },

  async set(key, val) {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('kv', 'readwrite');
        tx.objectStore('kv').put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) { console.warn('IDB set error:', e); }
  },

  async addHistory(record) {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('workout_history', 'readwrite');
        tx.objectStore('workout_history').add(record);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) { console.warn('IDB addHistory error:', e); }
  },

  async getAllHistory() {
    try {
      const db = await this._open();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('workout_history', 'readonly');
        const r = tx.objectStore('workout_history').getAll();
        r.onsuccess = () => resolve(r.result || []);
        r.onerror = () => reject(r.error);
      });
    } catch { return []; }
  }
};

/* ===============================================================
   DATA STORE (IndexedDB + Supabase hybrid)
   =============================================================== */
const Store = {
  _d: emptyWorkoutPlan(),
  _custom: normalizeTemplates(),
  _lastReset: '',
  _history: [],

  async init() {
    // 1) 先从 IndexedDB 读取缓存（离线可用 & 快速启动）
    try {
      const cached = await IDBCache.get('fitness_data');
      if (cached) {
        this._d = { ...emptyWorkoutPlan(), ...(cached.exercises || {}) };
        this._custom = normalizeTemplates(cached.custom_exercises);
        this._lastReset = cached.last_reset || '';
      }
      this._history = await IDBCache.getAllHistory();
    } catch (e) {
      console.warn('IDB read error:', e);
    }

    // 2) 后台拉取 Supabase 最新数据（联网时合并）
    try {
      if (!supabaseClient) throw new Error('No supabase client');
      const { data, error } = await supabaseClient
        .from('fitness_data')
        .select('*')
        .eq('user_id', USER_ID)
        .single();

      if (data) {
        // Supabase 数据作为权威来源
        this._d = { ...emptyWorkoutPlan(), ...(data.exercises || {}) };
        this._custom = data.custom_exercises ? normalizeTemplates(data.custom_exercises) : this._custom;
        this._lastReset = data.last_reset || this._lastReset;
        // 同步到 IndexedDB
        await this._saveToIDB();
      } else {
        await supabaseClient.from('fitness_data').insert([{ user_id: USER_ID }]);
      }
    } catch (e) {
      console.warn('Supabase load error (offline mode):', e);
    }
  },

  load() { return this._d; },

  async _saveToIDB() {
    await IDBCache.set('fitness_data', {
      exercises: this._d,
      custom_exercises: this._custom,
      last_reset: this._lastReset
    });
  },

  save() {
    // 写入 IndexedDB（同步保障）
    this._saveToIDB();

    // 异步写入 Supabase（Optimistic UI）
    if (supabaseClient) {
      supabaseClient.from('fitness_data').update({
        exercises: this._d,
        custom_exercises: this._custom,
        last_reset: this._lastReset,
        updated_at: new Date().toISOString()
      }).eq('user_id', USER_ID).then(({ error }) => {
        if (error) console.warn('Supabase sync error:', error);
      });
    }
  },

  getTemplates(part) { return this._custom[part] || []; },

  upsertTemplate(part, exercise) {
    if (!this._custom[part]) this._custom[part] = [];
    const template = {
      name: exercise.name,
      sets: exercise.sets,
      reps: exercise.reps,
      weight: exercise.weight
    };
    const idx = this._custom[part].findIndex(t => t.name.toLowerCase() === exercise.name.toLowerCase());
    if (idx >= 0) this._custom[part][idx] = template;
    else this._custom[part].unshift(template);
  },

  removeTemplate(part, name) {
    this._custom[part] = this.getTemplates(part).filter(t => t.name !== name);
    this.save();
  },

  getLastReset() { return this._lastReset; },

  setLastReset(v) {
    this._lastReset = v;
    this.save();
  },

  getHistory() { return this._history; },

  async addHistoryEntry(entry) {
    this._history.push(entry);
    await IDBCache.addHistory(entry);
    // Also sync to Supabase (fire & forget)
    if (supabaseClient) {
      supabaseClient.from('fitness_data').update({
        history: this._history.slice(-90), // keep last 90 entries
        updated_at: new Date().toISOString()
      }).eq('user_id', USER_ID).then(({ error }) => {
        if (error) console.warn('Supabase history sync error:', error);
      });
    }
  }
};

/* ===============================================================
   DAILY RESET (with history snapshot)
   =============================================================== */
function checkReset() {
  const now = new Date();
  const boundary = new Date(now);
  boundary.setHours(2, 0, 0, 0);
  if (now < boundary) boundary.setDate(boundary.getDate() - 1);

  const last = Store.getLastReset();
  const lastDate = last ? new Date(last) : new Date(0);

  if (lastDate < boundary) {
    const data = Store.load();

    // === 保存历史快照 ===
    let anyData = false;
    const snapshot = { date: boundary.toISOString().slice(0, 10), parts: {} };
    for (const p of PARTS) {
      if (data[p] && data[p].length) {
        const completed = data[p].filter(ex =>
          ex.completedSets && ex.completedSets.some(Boolean)
        );
        if (completed.length) {
          anyData = true;
          snapshot.parts[p] = completed.map(ex => ({
            name: ex.name,
            sets: ex.sets,
            reps: ex.reps,
            weight: ex.weight,
            done: ex.completedSets ? ex.completedSets.filter(Boolean).length : 0
          }));
        }
      }
    }
    if (anyData) {
      Store.addHistoryEntry(snapshot);
    }

    // === 重置所有组 ===
    for (const p of PARTS) {
      if (data[p]) for (const ex of data[p]) {
        if (ex.completedSets) {
          ex.completedSets = ex.completedSets.map(() => false);
        }
      }
    }
    Store.setLastReset(now.toISOString());
  }
}

/* ===============================================================
   UI: ACCENT & TAB
   =============================================================== */
let activeTab = 'chest';
let settingsPart = 'chest';

function setAccent(part) {
  const s = document.documentElement.style;
  s.setProperty('--accent', COLORS[part]);
  s.setProperty('--accent-glow', GLOWS[part]);
}

function moveTabIndicator(tabId) {
  const tabEl = document.getElementById('tab-' + tabId);
  const bar = document.getElementById('tabBar');
  const indicator = document.getElementById('tabIndicator');
  if (!tabEl || !bar || !indicator) return;
  const barRect = bar.getBoundingClientRect();
  const tabRect = tabEl.getBoundingClientRect();
  indicator.style.left = (tabRect.left - barRect.left + tabRect.width * 0.25) + 'px';
  indicator.style.width = (tabRect.width * 0.5) + 'px';
  indicator.style.background = COLORS[tabId] || COLORS.history;
  indicator.style.boxShadow = '0 4px 14px ' + (GLOWS[tabId] || GLOWS.history);
}

function switchTab(part) {
  activeTab = part;
  setAccent(part);

  document.querySelectorAll('.tab-item').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === part)
  );
  document.querySelectorAll('.tab-panel').forEach(el =>
    el.classList.toggle('active', el.dataset.part === part)
  );

/* ===============================================================
   UI: RENDER EXERCISES
   =============================================================== */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderExercises(part) {
  const panel = document.getElementById('panel-' + part);
  const exercises = Store.load()[part];

  if (!exercises || !exercises.length) {
    panel.innerHTML = `
      <div class="empty-state">
        <img class="empty-illustration" src="assets/illustrations/empty-workout-illustration.webp" width="292" height="320" alt="" draggable="false">
        <p>还没有训练动作<br>点击 <strong>+</strong> 添加</p>
      </div>`;
    return;
  }

  panel.innerHTML = exercises.map((ex, i) => {
    const completedSets = ex.completedSets || Array(ex.sets || 0).fill(false);
    const done = completedSets.filter(Boolean).length;
    const allDone = done === ex.sets;
    return `<div class="exercise-card${allDone ? ' all-done' : ''}" data-idx="${i}" style="animation-delay:${i * 0.07}s">
      <div class="card-header">
        <span class="card-name">${esc(ex.name)}</span>
        <span class="card-weight">${ex.weight}kg</span>
        <button class="btn-delete" data-action="delete" data-idx="${i}" aria-label="删除">&times;</button>
      </div>
      <div class="card-info">${ex.reps} 次 × ${ex.sets} 组</div>
      <div class="set-row">
        ${completedSets.map((s, si) =>
          `<div class="set-circle${s ? ' done' : ''}" data-action="toggle" data-ex="${i}" data-set="${si}">${s ? '✓' : (si + 1)}</div>`
        ).join('')}
      </div>
      <div class="card-footer">
        <span class="card-progress">${done}/${ex.sets} 组</span>
        <span class="card-pct">${ex.sets ? Math.round(done / ex.sets * 100) : 0}%</span>
      </div>
    </div>`;
  }).join('');
}

/* ===============================================================
   UI: TOGGLE SET (with effects)
   =============================================================== */
function toggleSet(exIdx, setIdx) {
  const data = Store.load();
  const ex = data[activeTab][exIdx];
  if (!ex.completedSets) ex.completedSets = Array(ex.sets).fill(false);
  const wasComplete = ex.completedSets.filter(Boolean).length === ex.sets;
  ex.completedSets[setIdx] = !ex.completedSets[setIdx];
  Store.save();

  const card = document.querySelectorAll('.tab-panel.active .exercise-card')[exIdx];
  if (!card) return;

  const circle = card.querySelectorAll('.set-circle')[setIdx];
  const justDone = ex.completedSets[setIdx];
  circle.classList.toggle('done', justDone);
  circle.textContent = justDone ? '✓' : (setIdx + 1);

  // Pop animation
  circle.style.animation = 'none';
  void circle.offsetHeight;
  circle.style.animation = 'pop 0.35s cubic-bezier(0.34,1.56,0.64,1)';

  // Ripple inside circle
  if (justDone) {
    createRipple(circle);
    particleBurst(circle);
  }

  // Update footer
  const done = ex.completedSets.filter(Boolean).length;
  card.querySelector('.card-progress').textContent = `${done}/${ex.sets} 组`;
  card.querySelector('.card-pct').textContent = `${Math.round(done / ex.sets * 100)}%`;

  const allDone = done === ex.sets;
  card.classList.toggle('all-done', allDone);

  // Celebrate if just completed all sets!
  if (allDone && !wasComplete) {
    card.classList.remove('celebrate');
    void card.offsetHeight;
    card.classList.add('celebrate');
    const rect = card.getBoundingClientRect();
    launchConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
    showToast('🎉 全部完成！太强了！');
  }

  updateProgress(activeTab);
}

function deleteExercise(idx) {
  const data = Store.load();
  const ex = data[activeTab][idx];
  if (!confirm(`删除「${ex.name}」？`)) return;
  data[activeTab].splice(idx, 1);
  Store.save();
  renderExercises(activeTab);
  updateProgress(activeTab);
}

/* ===============================================================
   UI: PROGRESS
   =============================================================== */
function updateProgress(part) {
  const exercises = Store.load()[part];
  let total = 0, done = 0;
  if (exercises) {
    for (const ex of exercises) {
      total += ex.sets;
      if (ex.completedSets) done += ex.completedSets.filter(Boolean).length;
    }
  }
  const pct = total ? Math.round(done / total * 100) : 0;
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');

  fill.style.width = pct + '%';

  const newText = total ? `${done}/${total} 组 · ${pct}%` : '暂无动作';
  if (text.textContent !== newText) {
    text.textContent = newText;
    text.classList.remove('pop');
    void text.offsetHeight;
    text.classList.add('pop');
  }
}

/* ===============================================================
   UI: STATS & CALENDAR
   =============================================================== */
let currentCalDate = new Date();
let selectedDateStr = null;

function calculateStats() {
  const history = Store.getHistory();
  const now = new Date();
  
  // Natural Week (Monday as start)
  const dayOfWeek = now.getDay() || 7; 
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dayOfWeek + 1);
  weekStart.setHours(0,0,0,0);
  
  // Natural Month
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  
  let weekDays = new Set();
  let monthDays = new Set();
  
  history.forEach(h => {
    const hDate = new Date(h.date + 'T00:00:00');
    if (hDate >= weekStart) weekDays.add(h.date);
    if (hDate >= monthStart) monthDays.add(h.date);
  });
  
  document.getElementById('statWeekDays').textContent = weekDays.size;
  document.getElementById('statMonthDays').textContent = monthDays.size;
}

function renderCalendar() {
  const year = currentCalDate.getFullYear();
  const month = currentCalDate.getMonth();
  
  document.getElementById('calendarTitle').textContent = `${year}年${month + 1}月`;
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  
  let firstDayOfWeek = firstDay.getDay() || 7; // Monday = 1
  
  const history = Store.getHistory();
  const historyDates = new Set(history.map(h => h.date));
  
  let html = '';
  // Empty cells before start of month
  for (let i = 1; i < firstDayOfWeek; i++) {
    html += `<div class="calendar-cell empty"></div>`;
  }
  
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasRecord = historyDates.has(dStr);
    const isSelected = selectedDateStr === dStr;
    const classes = ['calendar-cell'];
    if (hasRecord) classes.push('has-record');
    if (isSelected) classes.push('selected');
    
    html += `<div class="${classes.join(' ')}" onclick="selectDate('${dStr}')">${d}</div>`;
  }
  
  document.getElementById('calendarDates').innerHTML = html;
  renderDayDetails();
}

function selectDate(dateStr) {
  selectedDateStr = dateStr;
  renderCalendar(); // re-render to update selected styling
}

function renderDayDetails() {
  const container = document.getElementById('dayDetailsContainer');
  if (!selectedDateStr) {
    container.innerHTML = '';
    return;
  }
  
  const history = Store.getHistory();
  const record = history.find(h => h.date === selectedDateStr);
  
  if (!record) {
    container.innerHTML = `<div class="day-empty">这天没有训练记录</div>`;
    return;
  }
  
  let html = `<div class="day-details"><div class="day-details-title">${selectedDateStr} 训练记录</div>`;
  
  for (const part of PARTS) {
    if (record.parts[part] && record.parts[part].length > 0) {
      html += `<div style="font-size: 12px; margin-top: 10px; color: var(--text-dim);">${LABELS[part]}</div>`;
      for (const ex of record.parts[part]) {
        html += `
          <div class="day-detail-item">
            <div class="day-detail-name">${esc(ex.name)}</div>
            <div class="day-detail-stats">${ex.weight}kg · ${ex.done}/${ex.sets} 组</div>
          </div>
        `;
      }
    }
  }
  
  html += `</div>`;
  container.innerHTML = html;
}

function openStats() {
  calculateStats();
  currentCalDate = new Date();
  selectedDateStr = currentCalDate.toISOString().slice(0,10);
  renderCalendar();
  document.getElementById('statsModal').classList.add('open');
}

function closeStats() {
  document.getElementById('statsModal').classList.remove('open');
}

/* ===============================================================
   ANIMATIONS: PARTICLE BURST
   =============================================================== */
function particleBurst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const count = 10;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle-burst';
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const dist = 25 + Math.random() * 25;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${accent};
      --tx:${tx}px; --ty:${ty}px;
      width:${3 + Math.random() * 4}px;
      height:${3 + Math.random() * 4}px;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

/* ===============================================================
   ANIMATIONS: RIPPLE
   =============================================================== */
function createRipple(el) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = Math.max(el.offsetWidth, el.offsetHeight);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = '0px';
  ripple.style.top = '0px';
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

/* ===============================================================
   ANIMATIONS: CONFETTI (Canvas)
   =============================================================== */
function launchConfetti(x, y) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:9998;pointer-events:none';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const colors = ['#ff3366','#ff9933','#00e676','#2979ff','#ffeb3b','#e040fb','#fff'];
  const particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: x || canvas.width / 2,
      y: y || canvas.height / 2,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 0.5) * 14 - 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 7 + 3,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      gravity: 0.18,
      opacity: 1,
      decay: 0.012 + Math.random() * 0.018
    });
  }

  let frame;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx;
      p.vy += p.gravity;
      p.y += p.vy;
      p.vx *= 0.99;
      p.rotation += p.rotSpeed;
      p.opacity -= p.decay;
      if (p.opacity <= 0) continue;
      alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      // Mix rectangles and circles
      if (p.size > 6) {
        ctx.fillRect(-p.size / 2, -p.size * 0.3, p.size, p.size * 0.6);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    if (alive) frame = requestAnimationFrame(animate);
    else canvas.remove();
  }
  frame = requestAnimationFrame(animate);
}

   MODAL
   =============================================================== */
function populateTemplateChoices(part) {
  const templates = Store.getTemplates(part);
  const select = document.getElementById('templateSelect');
  const list = document.getElementById('exerciseList');
  select.innerHTML = `<option value="">选择已添加过的动作</option>${templates.map(t =>
    `<option value="${escAttr(t.name)}">${esc(t.name)} · ${t.reps}次 × ${t.sets}组 · ${t.weight}kg</option>`
  ).join('')}`;
  list.innerHTML = templates.map(t => `<option value="${escAttr(t.name)}">`).join('');
  select.value = '';
}

function applyTemplate(name) {
  const template = Store.getTemplates(activeTab).find(t => t.name === name);
  if (!template) return;
  document.getElementById('inputName').value = template.name;
  document.getElementById('inputSets').value = template.sets;
  document.getElementById('inputReps').value = template.reps;
  document.getElementById('inputWeight').value = template.weight;
}

function openModal() {
  const modal = document.getElementById('modal');
  modal.classList.add('open');
  populateTemplateChoices(activeTab);
  setTimeout(() => document.getElementById('inputName').focus(), 420);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveExercise() {
  const name = document.getElementById('inputName').value.trim();
  const sets = Math.max(1, parseInt(document.getElementById('inputSets').value) || 4);
  const reps = Math.max(1, parseInt(document.getElementById('inputReps').value) || 12);
  const weight = Math.max(0, parseFloat(document.getElementById('inputWeight').value) || 0);
  if (!name) {
    document.getElementById('inputName').focus();
    return;
  }

  const data = Store.load();
  const exercise = {
    id: Date.now().toString(36),
    name, sets, reps, weight,
    completedSets: Array(sets).fill(false)
  };
  data[activeTab].push(exercise);
  Store.upsertTemplate(activeTab, exercise);
  Store.save();

  document.getElementById('inputName').value = '';
  document.getElementById('templateSelect').value = '';
  closeModal();
  renderExercises(activeTab);
  updateProgress(activeTab);
  showToast('✅ 已添加');
}

/* ===============================================================
   INIT
   =============================================================== */
document.addEventListener('DOMContentLoaded', async () => {
  try {
    await Store.init();
  } catch (err) {
    console.error('Init error:', err);
  } finally {
    const loader = document.getElementById('loader');
    if (loader) {
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 400);
    }
  }

  try { checkReset(); } catch (e) { console.error('Reset error:', e); }

  try { PARTS.forEach(p => renderExercises(p)); } catch (e) { console.error('Render error:', e); }

  switchTab('chest');

  // Tab bar events
  document.getElementById('tabBar').addEventListener('click', e => {
    const tab = e.target.closest('.tab-item');
    if (tab) switchTab(tab.dataset.tab);
  });

  // Exercise panel events (delegation)
  document.querySelector('.tab-panels').addEventListener('click', e => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    if (t.dataset.action === 'toggle') toggleSet(+t.dataset.ex, +t.dataset.set);
    else if (t.dataset.action === 'delete') deleteExercise(+t.dataset.idx);
  });

  // FAB
  document.getElementById('fabAdd').addEventListener('click', openModal);
  document.getElementById('btnSettings').addEventListener('click', openSettings);
  document.getElementById('btnStats').addEventListener('click', openStats);

  // Stats Modal
  document.getElementById('btnCloseStats').addEventListener('click', closeStats);
  document.getElementById('statsModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeStats();
  });
  document.getElementById('btnPrevMonth').addEventListener('click', () => {
    currentCalDate.setMonth(currentCalDate.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('btnNextMonth').addEventListener('click', () => {
    currentCalDate.setMonth(currentCalDate.getMonth() + 1);
    renderCalendar();
  });

  // Modal
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('btnSave').addEventListener('click', saveExercise);
  document.getElementById('templateSelect').addEventListener('change', e => {
    if (e.target.value) applyTemplate(e.target.value);
  });

  // Settings / remembered exercise templates
  document.getElementById('btnCloseSettings').addEventListener('click', closeSettings);
  document.getElementById('settingsModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeSettings();
  });
  document.getElementById('settingsParts').addEventListener('click', e => {
    const btn = e.target.closest('[data-settings-part]');
    if (!btn) return;
    settingsPart = btn.dataset.settingsPart;
    setAccent(settingsPart);
    renderSettings();
  });
  document.getElementById('libraryList').addEventListener('click', e => {
    const use = e.target.closest('[data-template-use]');
    if (use) {
      useTemplateFromSettings(decodeURIComponent(use.dataset.templateUse));
      return;
    }
    const remove = e.target.closest('[data-template-remove]');
    if (!remove) return;
    const name = decodeURIComponent(remove.dataset.templateRemove);
    if (!confirm(`删除动作记录「${name}」？`)) return;
    Store.removeTemplate(settingsPart, name);
    renderSettings();
    showToast('已删除动作记录');
  });

  // Keyboard nav in form
  document.getElementById('inputName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inputSets').focus();
  });
  document.getElementById('inputWeight').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveExercise();
  });

  // Recalculate tab indicator on resize
  window.addEventListener('resize', () => moveTabIndicator(activeTab));
});
</script>
</body>
</html>
